name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows (x64)
            build_args: --win --x64
          # Apple Silicon runner cross-builds BOTH Mac DMGs (arm64 + Intel x64).
          # We avoid the macos-13 Intel runner — GitHub is retiring it and its
          # queue is unreliable (hangs for hours). electron-builder packages
          # Electron's prebuilt x64 binaries, so no Intel hardware is needed.
          - os: macos-latest
            name: macOS (Apple Silicon + Intel)
            build_args: --mac --arm64 --x64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npm run build && npx electron-builder ${{ matrix.build_args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
